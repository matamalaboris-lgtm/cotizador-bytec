<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bytec Security — Cotizador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

      <div class="brand">
        <img src="assets/bytec-logo-white.png" alt="ByTEC Security" style="height:27px;display:block;">
        <div style="margin-left:4px;border-left:1px solid var(--stroke-2);padding-left:12px;">

          <div class="brand-sub">command center</div>
        </div>
      </div>
      <nav class="tabs" id="tabs"></nav>
      <div class="live"><span class="pulse"></span> sistema en línea</div>
    </header>

    <main class="stage">
      <div class="stage-inner" id="stage-inner"></div>
    </main>
  </div>

  <div id="tweaks-root"></div>

  <!-- screen modules -->
  <script src="screens-hifi/dashboard.js"></script>
  <script src="screens-hifi/editor.js"></script>
  <script src="screens-hifi/preview-catalog-clients.js"></script>
  <script src="screens-hifi/tracking-mobile.js"></script>

  <!-- Tweaks -->

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks-hifi.jsx"></script>
